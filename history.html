<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance History – SmartAttend</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body onload="loadHistory()">

    <nav class="navbar">
        <a class="navbar-brand" href="student-dashboard.html">
            <span class="dot"></span> SmartAttend
        </a>
        <div class="navbar-actions">
            <a class="navbar-link" href="student-dashboard.html">← Back</a>
        </div>
    </nav>

    <div class="main">

        <div class="section-header">
            <h1>📋 Attendance History</h1>
            <p>Your complete attendance log</p>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>

    </div>

</html>
