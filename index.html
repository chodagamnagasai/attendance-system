<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        function goLogin(role) {
            localStorage.setItem("selectedRole", role);
            window.location.href = "login.html";
        }
    </script>
</head>
<body>
    <div class="page-center">

        <div class="landing-logo">Smart<span>Attend</span></div>
        <p class="landing-sub">Track attendance, effortlessly.</p>

        <div class="role-grid">

            <div class="card blue" onclick="goLogin('student')" style="width:200px; text-align:center;">
                <span class="card-icon">🎓</span>
                <h3>Student</h3>
                <p>Mark &amp; track attendance</p>
            </div>

            <div class="card indigo" onclick="goLogin('faculty')" style="width:200px; text-align:center;">
                <span class="card-icon">👨‍🏫</span>
                <h3>Faculty</h3>
                <p>Generate live QR codes</p>
            </div>

        </div>

    </div>
</body>
</html>
