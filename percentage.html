<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance % – SmartAttend</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body onload="loadPercentage()">

    <nav class="navbar">
        <a class="navbar-brand" href="student-dashboard.html">
            <span class="dot"></span> SmartAttend
        </a>
        <div class="navbar-actions">
            <a class="navbar-link" href="student-dashboard.html">← Back</a>
        </div>
    </nav>

    <div class="main">

        <div class="section-header">
            <h1>📊 Attendance %</h1>
            <p>Based on 30 total classes</p>
        </div>

        <div class="panel" style="max-width: 400px;">
            <div class="percent-value" id="percent">—</div>
            <div class="percent-label">classes attended out of 30</div>
            <div class="progress-wrap">
                <div class="progress-bar" id="percentBar"></div>
            </div>
        </div>

    </div>

</body>
</html>
